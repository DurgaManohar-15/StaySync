<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STAY SYNC - Login & Sign Up</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <header class="header">
      <h1>STAY SYNC</h1>
      <p>Your Guide to Private Hostels & PGs</p>
    </header>

    <div class="form-container">
      <div class="form-toggle">
        <button id="loginBtn" class="active">Login</button>
        <button id="signupBtn">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form" action="/login" method="POST">
        <h2>Login</h2>
        <label for="loginEmail">Email:</label>
        <input
          type="email"
          id="loginEmail"
          name="email"
          placeholder="Enter your email"
          required
        />

        <label for="loginPassword">Password:</label>
        <input
          type="password"
          id="loginPassword"
          name="password"
          placeholder="Enter your password"
          required
        />

        <label for="loginRole">Role:</label>
        <select id="loginRole" name="role" required>
          <option value="student">Student</option>
          <option value="admin">Hostel Owner</option>
        </select>

        <button type="submit">Login</button>
      </form>

      <!-- Sign-Up Form -->
      <form
        id="signupForm"
        class="form"
        style="display: none"
        action="/signup"
        method="POST"
      >
        <h2>Sign Up</h2>
        <label for="signupUsername">Username:</label>
        <input
          type="text"
          id="signupUsername"
          name="username"
          placeholder="Choose a username"
          required
        />

        <label for="signupEmail">Email:</label>
        <input
          type="email"
          id="signupEmail"
          name="email"
          placeholder="Enter your email"
          required
        />

        <label for="signupPassword">Password:</label>
        <input
          type="password"
          id="signupPassword"
          name="password"
          placeholder="Create a password"
          required
        />

        <label for="signupRole">Role:</label>
        <select id="signupRole" name="role" required>
          <option value="student">Student</option>
          <option value="admin">Hostel Owner</option>
        </select>

        <button type="submit">Sign Up</button>
      </form>
    </div>

    <script>
      // Toggle between Login and Signup forms
      document.getElementById("loginBtn").addEventListener("click", () => {
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginBtn").classList.add("active");
        document.getElementById("signupBtn").classList.remove("active");
      });

      document.getElementById("signupBtn").addEventListener("click", () => {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "block";
        document.getElementById("signupBtn").classList.add("active");
        document.getElementById("loginBtn").classList.remove("active");
      });

      // Signup Form Submission (fixed version)
      document
        .getElementById("signupForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const username = document.getElementById("signupUsername").value;
          const email = document.getElementById("signupEmail").value;
          const password = document.getElementById("signupPassword").value;
          const role = document.getElementById("signupRole").value;

          try {
            const response = await fetch("/signup", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, email, password, role }),
            });

            const result = await response.json();

            if (response.ok) {
              if (role === "admin") {
                sessionStorage.setItem("adminUser", username);
              } else {
                sessionStorage.setItem("studentUser", username);
              }

              alert(result.message);
              document.getElementById("signupForm").reset();
              document.getElementById("loginBtn").click(); // Switch to Login
            } else {
              alert("Signup failed: " + result.error);
            }
          } catch (error) {
            console.error("Error:", error);
          }
        });

      // Login Form Submission
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;
          const role = document.getElementById("loginRole").value;

          try {
            const response = await fetch("/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password, role }),
            });

            const result = await response.json();
            if (response.ok) {
              sessionStorage.setItem(
                "loggedInUser",
                JSON.stringify(result.user)
              );
              window.location.href = result.redirect; // Redirect based on role
            } else {
              alert("Login failed: " + result.error);
            }
          } catch (error) {
            console.error("Error:", error);
          }
        });
    </script>
  </body>
</html>
