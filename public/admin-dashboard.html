<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | STAY SYNC</title>
    <link rel="stylesheet" href="admin-dashboard.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h2>STAY SYNC Admin</h2>
      <nav>
        <ul>
          <li><a href="admin-dashboard.html">Dashboard</a></li>
          <li><a href="add-hostel.html">Add Hostel</a></li>
          <!--  <li><a href="#">Manage Bookings</a></li> -->
          <li><a href="login.html">Logout</a></li>
        </ul>
      </nav>
    </aside>

    <div class="main-content">
      <header>
        <h1>Admin Dashboard</h1>
        <p>Welcome, <span id="admin-name">user</span></p>
      </header>

      <!-- Registered Hostels Section -->
      <section class="registered-hostels">
        <h2>Registered Hostels</h2>
        <table>
          <thead>
            <tr>
              <th>Hostel Name</th>
              <th>Location</th>
              <th>Rent</th>
              <th>Food</th>
              <th>Distance</th>
              <th>Owner</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="hostel-list">
            <!-- Hostel data will be added dynamically -->
          </tbody>
        </table>
      </section>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let loggedInUser = sessionStorage.getItem("adminUser");
        document.getElementById("admin-name").textContent =
          loggedInUser || "Guest";

        function loadHostels() {
          fetch("http://localhost:3000/fetch-hostels")
            .then((response) => response.json())
            .then((data) => {
              let hostelList = document.getElementById("hostel-list");
              hostelList.innerHTML = "";

              data.forEach((hostel) => {
                let row = document.createElement("tr");
                row.innerHTML = `
                                <td>${hostel.name}</td>
                                <td>${hostel.location}</td>
                                <td>₹${hostel.rent}</td>
                                <td>${hostel.food}</td>
                                <td>${hostel.distance} km</td>
                                <td>${hostel.owner_name}</td>
                                <td>
                                    <button class="delete-btn" data-id="${hostel.id}">🗑 Delete</button>
                                </td>
                            `;
                hostelList.appendChild(row);
              });

              document.querySelectorAll(".delete-btn").forEach((button) => {
                button.addEventListener("click", function () {
                  let hostelId = this.getAttribute("data-id");
                  deleteHostel(hostelId);
                });
              });
            })
            .catch((error) => console.error("Error:", error));
        }

        function deleteHostel(id) {
          if (confirm("Are you sure you want to delete this hostel?")) {
            fetch(`http://localhost:3000/delete-hostel/${id}`, {
              method: "DELETE",
            })
              .then((response) => response.json())
              .then((data) => {
                alert(data.message);
                loadHostels();
              })
              .catch((error) => console.error("Error:", error));
          }
        }

        loadHostels();
      });
    </script>
  </body>
</html>
